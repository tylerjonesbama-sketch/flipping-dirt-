// ─── STORAGE (localStorage — persists per browser/device) ──────────────────
const KEY  = "landflip:deals:v2";
const BKEY = "landflip:budget:v1";

async function loadDeals() {
  try { const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : []; }
  catch { return []; }
}
async function saveDeals(d) {
  try { localStorage.setItem(KEY, JSON.stringify(d)); } catch { }
}
function loadBudget() {
  try { const v = localStorage.getItem(BKEY); return v ? JSON.parse(v) : { cash: "", reserve: "", mail: "" }; }
  catch { return { cash: "", reserve: "", mail: "" }; }
}
function saveBudget(b) {
  try { localStorage.setItem(BKEY, JSON.stringify(b)); } catch { }

// ─── BUDGET MATH (shared by Budget tab, Dashboard, Analyzer) ─────────────────
// Committed = money locked in deals under contract. Pending = offers out that
// could still be accepted. Available = what you can safely deploy today.
function computeBudget(budget, deals) {
  const cash    = Number(budget.cash)    || 0;
  const reserve = Number(budget.reserve) || 0;
  const mail    = Number(budget.mail)    || 0;

  const committed = deals
    .filter(d => d.stage === "Under Contract")
    .reduce((s, d) => s + (Number(d.offerPrice) || 0), 0);

  const pending = deals
    .filter(d => d.stage === "Offer Sent")
    .reduce((s, d) => s + (Number(d.offerPrice) || 0), 0);

  const available   = Math.max(0, cash - reserve - mail - committed);
  const maxPurchase = Math.floor(available / 1.03);          // leaves room for ~3% closing
  const maxClosing  = available - maxPurchase;

  // Deal capacity: how many typical deals fit in available capital.
  // Uses your avg active offer if you have one, else a $5,000 default.
  const activeOffers = deals
    .filter(d => ["Offer Sent", "Under Contract"].includes(d.stage))
    .map(d => Number(d.offerPrice) || 0)
    .filter(v => v > 0);
  const typicalOffer = activeOffers.length
    ? Math.round(activeOffers.reduce((s, v) => s + v, 0) / activeOffers.length)
    : 5000;
  const typicalAllIn = Math.round(typicalOffer * 1.03);
  const capacity     = typicalAllIn > 0 ? Math.floor(available / typicalAllIn) : 0;

  const isSet = cash > 0;
  const overExtended = pending > available;

  return { cash, reserve, mail, committed, pending, available, maxPurchase, maxClosing, typicalOffer, typicalAllIn, capacity, isSet, overExtended };
}

// ─── CLAUDE API (via /api/claude serverless proxy) ──────────────────────────
async function askClaude(prompt, system, webSearch = false) {
  const body = {
    model: "claude-sonnet-4-6",
    max_tokens: 1500,
    system,
    messages: [{ role: "user", content: prompt }],
  };
  if (webSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  const r = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error("API request failed");
  const d = await r.json();
  if (d.error) throw new Error(d.error.message || "API error");
  return (d.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
}

// ─── PRIMITIVES ─────────────────────────────────────────────────────────────

function Card({ children, style = {}, onClick }) {

    <div style={{ ...baseCard, padding: 18, ...style }} onClick={onClick}>

    </div>

}

function Label({ children }) {

    <div style={{ fontSize: 10, color: P.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 6 }}>

    </div>

}

function Inp({ label, value, onChange, placeholder, type = "text", small }) {
  return (
    <div style={{ marginBottom: small ? 10 : 14 }}>
      {label && <Label>{label}</Label>}
      <input
        type={type}
        value={value}
        onChange={e => onChange(e.target.value)}
        placeholder={placeholder}
        style={{
          width: "100%", boxSizing: "border-box",
          background: P.bg, border: `1px solid ${P.border}`, borderRadius: 6,
          color: P.text, padding: small ? "7px 11px" : "9px 13px",
          fontSize: small ? 13 : 14, outline: "none",
        }}
      />
    </div>
  );
}

function Btn({ children, onClick, color, outline, loading, disabled, small, full, style = {} }) {
  const bg2   = disabled || loading ? P.faint : (outline ? "transparent" : (color || P.green));
  const fg    = disabled || loading ? P.muted : (outline ? (color || P.green) : "#FBF7EE");
  const bord  = disabled || loading ? P.faint : (color || P.green);
  return (
    <button onClick={onClick} disabled={disabled || loading} style={{
      background: bg2, border: `1px solid ${bord}`, color: fg,
      borderRadius: 6, padding: small ? "5px 12px" : "9px 18px",
      fontSize: small ? 12 : 14, fontWeight: 700, cursor: disabled || loading ? "not-allowed" : "pointer",
      width: full ? "100%" : "auto", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6,
      letterSpacing: "0.01em", ...style,
    }}>
      {loading ? "Working…" : children}
    </button>
  );
}

function Badge({ children, color, style = {} }) {
  return (
    <span style={{ background: color + "22", border: `1px solid ${color}44`, color, borderRadius: 5, padding: "2px 8px", fontSize: 11, fontWeight: 700, ...style }}>

}

function ProgressBar({ pct, color = P.green, height = 10 }) {

  );
}

// ─── DASHBOARD ──────────────────────────────────────────────────────────────
function Dashboard({ deals, budget }) {
  const closed  = deals.filter(d => d.stage === "Closed");

          <span style={{ color: P.muted }}>${left.toLocaleString()} to go · ~{dealsLeft} more deal{dealsLeft !== 1 ? "s" : ""}</span>

      </Card>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 16 }}>

// ─── BUDGET ENGINE ──────────────────────────────────────────────────────────
function BudgetEngine({ deals, budget, setBudget }) {
  const B = computeBudget(budget, deals);

  const upd = k => v => {
    const next = { ...budget, [k]: v };
    setBudget(next);
    saveBudget(next);
  };

  const flow = [
    { l: "Total Cash",        v: B.cash,      c: P.text,   sign: ""  },
    { l: "Reserve (never touch)", v: B.reserve, c: P.amber, sign: "−" },
    { l: "Mail Budget",       v: B.mail,      c: P.amber,  sign: "−" },
    { l: "Committed (under contract)", v: B.committed, c: P.purple, sign: "−" },
  ];

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 900, fontSize: 20, color: P.text, letterSpacing: "-0.02em" }}>💰 Budget Engine</div>
        <div style={{ color: P.muted, fontSize: 13, marginTop: 4 }}>Your CFO. It always knows what you can afford — so you never over-commit.</div>
      </div>

      <Card style={{ marginBottom: 16 }}>
        <Label>Your Numbers</Label>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
          <Inp label="Total Cash ($)" value={budget.cash} onChange={upd("cash")} type="number" placeholder="10000" />
          <Inp label="Reserve — Safety Net ($)" value={budget.reserve} onChange={upd("reserve")} type="number" placeholder="2000" />
          <Inp label="Mail / Marketing Budget ($)" value={budget.mail} onChange={upd("mail")} type="number" placeholder="300" />
        </div>
        <div style={{ fontSize: 11, color: P.muted, lineHeight: 1.5 }}>
          Saved automatically. Committed capital updates itself from your Pipeline as deals go under contract.
        </div>
      </Card>

      {!B.isSet ? (
        <Card style={{ textAlign: "center", padding: 34 }}>
          <div style={{ fontSize: 30, marginBottom: 8 }}>💵</div>
          <div style={{ fontWeight: 700, color: P.text, marginBottom: 4 }}>Enter your total cash to activate the engine</div>
          <div style={{ fontSize: 12, color: P.muted }}>Everything below calculates automatically once it knows your starting capital.</div>
        </Card>
      ) : (
        <React.Fragment>
          <Card style={{ marginBottom: 14, background: P.card2 }}>
            <Label>Capital Flow</Label>
            {flow.map(({ l, v, c, sign }) => (
              <div key={l} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: `1px solid ${P.border}`, fontSize: 13 }}>
                <span style={{ color: P.muted }}>{l}</span>
                <span style={{ fontWeight: 800, color: c }}>{sign}${v.toLocaleString()}</span>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 12 }}>
              <span style={{ fontWeight: 800, color: P.text, fontSize: 14 }}>Available to Invest</span>
              <span style={{ fontWeight: 900, color: P.greenBr, fontSize: 22, letterSpacing: "-0.02em" }}>${B.available.toLocaleString()}</span>
            </div>
          </Card>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 14 }}>
            <Card style={{ textAlign: "center", border: `1px solid ${P.green}55` }}>
              <div style={{ fontSize: 26, fontWeight: 900, color: P.greenBr, letterSpacing: "-0.02em" }}>${B.maxPurchase.toLocaleString()}</div>
              <div style={{ fontSize: 11, color: P.muted, marginTop: 5 }}>Max Purchase Today</div>
              <div style={{ fontSize: 10, color: P.faint, marginTop: 2 }}>leaves ~3% for closing</div>
            </Card>
            <Card style={{ textAlign: "center" }}>
              <div style={{ fontSize: 26, fontWeight: 900, color: P.blue, letterSpacing: "-0.02em" }}>${B.maxClosing.toLocaleString()}</div>
              <div style={{ fontSize: 11, color: P.muted, marginTop: 5 }}>Set Aside for Closing</div>
              <div style={{ fontSize: 10, color: P.faint, marginTop: 2 }}>deed prep, recording, notary</div>
            </Card>
            <Card style={{ textAlign: "center" }}>
              <div style={{ fontSize: 26, fontWeight: 900, color: P.purple, letterSpacing: "-0.02em" }}>{B.capacity}</div>
              <div style={{ fontSize: 11, color: P.muted, marginTop: 5 }}>Deal Capacity</div>
              <div style={{ fontSize: 10, color: P.faint, marginTop: 2 }}>at ~${B.typicalAllIn.toLocaleString()} all-in each</div>
            </Card>
          </div>

          {B.pending > 0 && (
            <Card style={{ background: B.overExtended ? "#F6ECD4" : "#E9F0E2", border: `1px solid ${B.overExtended ? P.amber : P.green}44`, marginBottom: 14 }}>
              <div style={{ fontSize: 13, color: B.overExtended ? P.amber : P.green, lineHeight: 1.65 }}>
                {B.overExtended
                  ? <span>⚠️ <strong>Careful:</strong> ${B.pending.toLocaleString()} in offers are out, but only ${B.available.toLocaleString()} is available. If more than {B.capacity} get{B.capacity === 1 ? "s" : ""} accepted, you'll have to back out or find capital. Consider pausing new offers until something resolves.</span>
                  : <span>📬 <strong>Offers outstanding:</strong> ${B.pending.toLocaleString()} across your "Offer Sent" deals. If all accepted, you'd still have ${(B.available - B.pending).toLocaleString()} left — you're within budget.</span>}
              </div>
            </Card>
          )}

          <Card style={{ background: P.card2 }}>
            <Label>How the Engine Protects You</Label>
            <div style={{ fontSize: 12, color: P.muted, lineHeight: 1.8 }}>
              1. Your reserve is untouchable — the engine never counts it as investable.<br />
              2. Money goes to "Committed" the moment a deal hits Under Contract in your Pipeline.<br />
              3. Max Purchase already accounts for ~3% closing costs, so the number you see is the number you can actually offer.<br />
              4. The Deal Analyzer checks every simulated purchase against this budget automatically.
            </div>
          </Card>
        </React.Fragment>
      )}
    </div>
  );
}

// ─── MARKET SCOUT ───────────────────────────────────────────────────────────
function MarketScout() {
  const [county, setCounty] = useState("");
  const [state,  setState]  = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult]   = useState(null);
  const [err, setErr]         = useState("");

  const run = async () => {
    if (!county || !state) return;
    setLoading(true); setErr(""); setResult(null);
    try {
      const text = await askClaude(
        `Research the vacant land market in ${county} County, ${state}. I'm a land flipper targeting small rural recreational parcels (1-10 acres) to buy at 25-35 cents on the dollar. Search for current listings, recent sales, price per acre, days on market, buyer demand.`,
        `You are a land investing research analyst. Search the web for current land market data in the requested county. Return ONLY valid JSON with NO markdown, NO backticks, NO preamble. Exactly these keys: marketScore (integer 1-10), avgPricePerAcre (integer USD), buyRangePerAcre (string e.g. "$900-1,400/acre"), competitionLevel ("Low", "Medium", or "High"), verdict (string, 1 sentence), tips (array of 3 strings), topSites (array of 3 strings).`,
        true

      const clean = text.replace(/```json|```/g, "").trim();

        {err && <div style={{ color: P.red, fontSize: 13, marginTop: 10 }}>⚠️ {err}</div>}

        <React.Fragment>

            <Card style={{ textAlign: "center" }}>

              <div style={{ color: P.muted, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 6 }}>Market Score /10</div>

            <Card style={{ textAlign: "center" }}>
              <div style={{ fontSize: 26, fontWeight: 900, color: P.blue, lineHeight: 1 }}>${result.avgPricePerAcre?.toLocaleString()}</div>
              <div style={{ color: P.muted, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 6 }}>Avg $/Acre (Retail)</div>

// ─── PROFIT SIMULATOR ───────────────────────────────────────────────────────
function ProfitSimulator({ mv, budgetInfo }) {
  const lo = Math.max(100, Math.round(mv * 0.10 / 100) * 100);
  const hi = Math.round(mv * 0.60 / 100) * 100;
  const [price, setPrice] = useState(Math.round(mv * 0.30 / 100) * 100);
  const [hold,  setHold]  = useState(90);

  // Re-center slider when market value changes
  useEffect(() => { setPrice(Math.round(mv * 0.30 / 100) * 100); }, [mv]);

  const closing    = Math.round(mv * 0.03);
  const cashReq    = price + closing;
  const profit     = mv - cashReq;
  const roi        = cashReq > 0 ? (profit / cashReq) * 100 : 0;
  const annual     = hold > 0 ? roi * (365 / hold) : 0;
  const discount   = mv > 0 ? (price / mv) * 100 : 0;

  const discountColor = discount <= 35 ? P.greenBr : discount <= 45 ? P.amber : P.red;
  const discountLabel = discount <= 25 ? "Aggressive — home run if accepted"
    : discount <= 35 ? "In the buy zone (25–35¢)"
    : discount <= 45 ? "Thin margin — negotiate down"
    : "Too rich — walk or counter hard";

  // Budget check
  let budgetCheck = null;
  if (budgetInfo && budgetInfo.isSet) {
    const over = cashReq - budgetInfo.available;
    budgetCheck = over <= 0
      ? { ok: true,  msg: `✅ Within budget — leaves $${(-over).toLocaleString()} available after this deal.` }
      : { ok: false, msg: `🚫 Over budget by $${over.toLocaleString()}. Your Budget Engine says max purchase today is $${budgetInfo.maxPurchase.toLocaleString()}.` };
  }

  return (
    <React.Fragment>
      <div style={{ fontWeight: 700, fontSize: 13, color: P.muted, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>Profit Simulator</div>
      <Card style={{ marginBottom: 22, border: `1px solid ${P.green}44` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, flexWrap: "wrap", gap: 6 }}>
          <Label>Purchase Price — drag to simulate</Label>
          <span style={{ fontWeight: 900, fontSize: 24, color: P.text, letterSpacing: "-0.02em" }}>${price.toLocaleString()}</span>
        </div>
        <input
          type="range" min={lo} max={hi} step={100} value={price}
          onChange={e => setPrice(Number(e.target.value))}
          style={{ width: "100%" }}
        />
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: P.faint, marginBottom: 12 }}>
          <span>${lo.toLocaleString()} (10¢)</span>
          <span>${hi.toLocaleString()} (60¢)</span>
        </div>

        <div style={{ textAlign: "center", marginBottom: 14 }}>
          <Badge color={discountColor} style={{ fontSize: 12 }}>
            {discount.toFixed(0)}¢ on the dollar · {discountLabel}
          </Badge>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 10, textAlign: "center", marginBottom: 14 }}>
          {[
            { l: "Est. Profit",   v: `${profit >= 0 ? "+" : "−"}$${Math.abs(profit).toLocaleString()}`, c: profit >= 0 ? P.greenBr : P.red },
            { l: "ROI",           v: `${roi.toFixed(0)}%`,                    c: P.amber },
            { l: "Cash Required", v: `$${cashReq.toLocaleString()}`,          c: P.blue },
            { l: "Annualized",    v: `${annual.toFixed(0)}%`,                 c: P.purple },
          ].map(({ l, v, c }) => (
            <div key={l} style={{ background: P.bg, borderRadius: 8, padding: "12px 8px", border: `1px solid ${P.border}` }}>
              <div style={{ fontSize: 19, fontWeight: 900, color: c, letterSpacing: "-0.02em" }}>{v}</div>
              <div style={{ fontSize: 10, color: P.muted, marginTop: 4 }}>{l}</div>
            </div>
          ))}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}>
          <Label>Estimated Days to Sell</Label>
          <span style={{ fontWeight: 800, fontSize: 14, color: P.text }}>{hold} days</span>
        </div>
        <input
          type="range" min={30} max={365} step={15} value={hold}
          onChange={e => setHold(Number(e.target.value))}
          style={{ width: "100%" }}
        />
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: P.faint }}>
          <span>30 days</span><span>1 year</span>
        </div>

        {budgetCheck && (
          <div style={{
            marginTop: 14, padding: "10px 14px", borderRadius: 7, fontSize: 13, lineHeight: 1.5,
            background: budgetCheck.ok ? "#E9F0E2" : "#F5E2DC",
            border: `1px solid ${budgetCheck.ok ? P.green : P.red}44`,
            color: budgetCheck.ok ? P.greenBr : P.red,
          }}>
            {budgetCheck.msg}
          </div>
        )}
        {(!budgetInfo || !budgetInfo.isSet) && (
          <div style={{ marginTop: 14, fontSize: 11, color: P.muted }}>
            💡 Set your capital in the Budget tab and the simulator will check every price against what you can actually afford.
          </div>
        )}
      </Card>
    </React.Fragment>
  );
}

// ─── DEAL ANALYZER ──────────────────────────────────────────────────────────
function DealAnalyzer({ deals, budget }) {
  const [mktVal, setMktVal] = useState("");
  const [askPx,  setAskPx]  = useState("");
  const [acres,  setAcres]  = useState("");

  const mv = Number(mktVal) || 0;
  const ap = Number(askPx) || 0;
  const budgetInfo = computeBudget(budget, deals);

  const closing = Math.round(mv * 0.03);

  const scenarios = [
    { pct: 0.25, label: "Aggressive", note: "25¢ on dollar — stretch ask" },
    { pct: 0.30, label: "Standard",   note: "30¢ — Joe's core target" },
    { pct: 0.35, label: "Safe",       note: "35¢ — conservative, strong margin" },
  ];

  const ofSell    = Math.round(mv * 1.3);
  const r         = 0.099 / 12;
  const n         = 60;
  const ofMonthly = mv ? Math.round((ofSell * r) / (1 - Math.pow(1 + r, -n))) : 0;
  const ofTotal   = ofMonthly * n;

  const dealFlag = ap && mv
    ? ap <= mv * 0.35
      ? { msg: `✅ Ask is ${((ap/mv)*100).toFixed(0)}% of market — potential deal. Run comps and send your offer.`, color: P.greenBr, bg: "#E9F0E2", bord: P.green }
      : { msg: `⚠️ Ask is ${((ap/mv)*100).toFixed(0)}% of market. Counter at $${Math.round(mv*0.30).toLocaleString()} (30¢) to make the numbers work.`, color: P.amber, bg: "#F6ECD4", bord: P.amber }
    : null;

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 900, fontSize: 20, color: P.text, letterSpacing: "-0.02em" }}>📊 Deal Analyzer</div>
        <div style={{ color: P.muted, fontSize: 13, marginTop: 4 }}>Instant offer calculations, live profit simulation, and owner-finance projections.</div>
      </div>

      <Card style={{ marginBottom: 16 }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12 }}>
          <Inp label="Seller's Ask Price ($)" value={askPx}  onChange={setAskPx}  type="number" placeholder="10000" />
          <Inp label="Est. Market Value ($)"  value={mktVal} onChange={setMktVal} type="number" placeholder="15000" />
          <Inp label="Acres"                  value={acres}  onChange={setAcres}  type="number" placeholder="5" />
        </div>
        {dealFlag && (
          <div style={{ padding: "10px 14px", borderRadius: 7, fontSize: 13, background: dealFlag.bg, border: `1px solid ${dealFlag.bord}44`, color: dealFlag.color, lineHeight: 1.5 }}>
            {dealFlag.msg}
          </div>
        )}
      </Card>

      {mv > 0 && (
        <React.Fragment>
          <ProfitSimulator mv={mv} budgetInfo={budgetInfo} />

          <div style={{ fontWeight: 700, fontSize: 13, color: P.muted, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>Cash Flip Scenarios</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 22 }}>
            {scenarios.map(({ pct, label, note }) => {
              const buy    = Math.round(mv * pct);
              const profit = mv - buy - closing;
              const roi    = buy > 0 ? ((profit / buy) * 100).toFixed(0) : 0;
              return (
                <Card key={label} style={{ textAlign: "center", border: pct === 0.30 ? `1px solid ${P.green}66` : `1px solid ${P.border}` }}>
                  <div style={{ fontSize: 10, color: P.muted, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 2 }}>{label}</div>
                  <div style={{ fontSize: 10, color: P.faint, marginBottom: 12 }}>{note}</div>
                  <div style={{ fontSize: 28, fontWeight: 900, color: P.blue, letterSpacing: "-0.02em" }}>${buy.toLocaleString()}</div>
                  <div style={{ fontSize: 11, color: P.muted, marginBottom: 12 }}>offer amount</div>
                  <div style={{ borderTop: `1px solid ${P.border}`, paddingTop: 12 }}>
                    <div style={{ fontSize: 18, fontWeight: 800, color: P.greenBr }}>+${profit.toLocaleString()}</div>
                    <div style={{ fontSize: 10, color: P.muted }}>est. profit</div>
                    <div style={{ marginTop: 6 }}>
                      <Badge color={P.amber}>ROI {roi}%</Badge>
                    </div>
                  </div>
                </Card>
              );
            })}
          </div>

          <div style={{ fontWeight: 700, fontSize: 13, color: P.muted, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>Owner Finance Scenario</div>
          <Card style={{ background: "#F0E8F2", border: `1px solid ${P.purple}44` }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 16, textAlign: "center" }}>
              {[
                { l: "Sale Price (130%)", v: `$${ofSell.toLocaleString()}`,        c: P.blue },
                { l: "Monthly Payment",   v: `$${ofMonthly.toLocaleString()}/mo`,  c: P.greenBr },
                { l: "Total Collected",   v: `$${ofTotal.toLocaleString()}`,       c: P.purple },
              ].map(({ l, v, c }) => (
                <div key={l}>
                  <div style={{ fontSize: 10, color: P.muted, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 8 }}>{l}</div>
                  <div style={{ fontSize: 22, fontWeight: 900, color: c }}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${P.border}`, fontSize: 11, color: P.muted, textAlign: "center" }}>
              9.9% APR · 60-month term · 0 down · passive income with no tenants
            </div>
          </Card>

          <Card style={{ marginTop: 12, background: P.card2 }}>
            <Label>Estimated Cost Breakdown</Label>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10 }}>
              {[
                { l: "Buy at 30¢", v: `$${Math.round(mv * 0.30).toLocaleString()}` },
                { l: "Est. Closing Costs (3%)", v: `$${closing.toLocaleString()}` },
                { l: "All-In Cost", v: `$${(Math.round(mv * 0.30) + closing).toLocaleString()}` },
              ].map(({ l, v }) => (
                <div key={l} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: P.muted, marginBottom: 4 }}>{l}</div>
                  <div style={{ fontSize: 16, fontWeight: 800, color: P.text }}>{v}</div>
                </div>
              ))}
            </div>
          </Card>
        </React.Fragment>
      )}
    </div>
  );
}

  const upd = k => v => setForm(p => ({ ...p, [k]: v }));

  const gen = async () => {
    setLoading(true); setLetter("");
    try {
      const txt = await askClaude(
        `Write a professional, friendly blind offer letter to purchase vacant land:
OWNER: ${form.ownerName} | ${form.ownerAddr}

            <Inp label="Your Email"   value={form.buyerEmail} onChange={upd("buyerEmail")} placeholder="tyler@email.com" />

        </div>

        <Card style={{ display: "flex", flexDirection: "column" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>

          <div style={{

// ─── PIPELINE ───────────────────────────────────────────────────────────────
function Pipeline({ deals, setDeals }) {
  const [showAdd, setShowAdd] = useState(false);
  const emptyDeal = { name: "", county: "", acres: "", askPrice: "", offerPrice: "", estimatedProfit: "", stage: "Lead", notes: "" };
  const [nd, setNd] = useState(emptyDeal);

  const upd = k => v => setNd(p => ({ ...p, [k]: v }));

  const add = async () => {
    if (!nd.name) return;
    const updated = [{ ...nd, id: Date.now().toString(), createdAt: new Date().toLocaleDateString(), profit: 0, ddComplete: {} }, ...deals];
    await saveDeals(updated); setDeals(updated);
    setNd(emptyDeal); setShowAdd(false);
  };

  const move = async (id, stage) => {
    const updated = deals.map(d => d.id === id
      ? { ...d, stage, ...(stage === "Closed" && { profit: Number(d.estimatedProfit) || 0 }) }
      : d
    );
    await saveDeals(updated); setDeals(updated);
  };

  const del = async (id) => {
    if (!window.confirm("Delete this deal?")) return;
    const updated = deals.filter(d => d.id !== id);
    await saveDeals(updated); setDeals(updated);
  };

  const byStage = s => deals.filter(d => d.stage === s);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
        <div>
          <div style={{ fontWeight: 900, fontSize: 20, color: P.text, letterSpacing: "-0.02em" }}>📋 Deal Pipeline</div>
          <div style={{ color: P.muted, fontSize: 13, marginTop: 3 }}>{deals.filter(d => !["Closed","Dead"].includes(d.stage)).length} active · {deals.filter(d => d.stage === "Closed").length} closed</div>
        </div>
        <Btn onClick={() => setShowAdd(p => !p)} outline>
          {showAdd ? "✕ Cancel" : "+ New Deal"}
        </Btn>
      </div>

      {showAdd && (
        <Card style={{ marginBottom: 20, border: `1px solid ${P.green}55` }}>
          <div style={{ fontWeight: 700, marginBottom: 14, color: P.text }}>Add New Deal</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
            <Inp label="Property Name / ID" value={nd.name} onChange={upd("name")} placeholder="Putnam FL – 5ac" />
            <Inp label="County, State" value={nd.county} onChange={upd("county")} placeholder="Putnam, FL" />
            <Inp label="Acres" value={nd.acres} onChange={upd("acres")} type="number" placeholder="5" />
            <Inp label="Ask Price ($)" value={nd.askPrice} onChange={upd("askPrice")} type="number" placeholder="8000" />
            <Inp label="Your Offer ($)" value={nd.offerPrice} onChange={upd("offerPrice")} type="number" placeholder="4500" />
            <Inp label="Est. Profit ($)" value={nd.estimatedProfit} onChange={upd("estimatedProfit")} type="number" placeholder="9000" />
          </div>
          <div style={{ marginBottom: 14 }}>
            <Label>Notes</Label>
            <textarea
              value={nd.notes}
              onChange={e => setNd(p => ({ ...p, notes: e.target.value }))}
              placeholder="Road access, zoning notes, seller motivation, source…"
              style={{ width: "100%", boxSizing: "border-box", background: P.bg, border: `1px solid ${P.border}`, borderRadius: 6, color: P.text, padding: "9px 13px", fontSize: 13, resize: "vertical", minHeight: 64 }}
            />
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn onClick={add} disabled={!nd.name}>Save Deal</Btn>
            <Btn onClick={() => { setNd(emptyDeal); setShowAdd(false); }} outline color={P.muted}>Cancel</Btn>
          </div>
        </Card>
      )}

      {STAGES.filter(s => s !== "Dead").map(stage => (
        <div key={stage} style={{ marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: SC[stage] }} />
            <span style={{ fontWeight: 700, fontSize: 14, color: P.text }}>{stage}</span>
            <span style={{ color: P.faint, fontSize: 12 }}>({byStage(stage).length})</span>
          </div>

          {byStage(stage).length === 0 ? (
            <div style={{ padding: "12px 16px", border: `1px dashed ${P.border}`, borderRadius: 8, color: P.faint, fontSize: 13 }}>
              No deals in {stage}
            </div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(255px, 1fr))", gap: 10 }}>
              {byStage(stage).map(deal => (
                <Card key={deal.id} style={{ border: `1px solid ${SC[stage]}33`, background: P.card2 }}>
                  <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 2, color: P.text }}>{deal.name}</div>
                  <div style={{ color: P.muted, fontSize: 12, marginBottom: 8 }}>
                    {deal.county}{deal.acres ? ` · ${deal.acres} ac` : ""}
                    {deal.askPrice ? ` · Ask $${Number(deal.askPrice).toLocaleString()}` : ""}
                  </div>
                  {Number(deal.estimatedProfit) > 0 && (
                    <div style={{ color: P.greenBr, fontWeight: 800, fontSize: 14, marginBottom: 8 }}>
                      +${Number(deal.estimatedProfit).toLocaleString()} est. profit
                    </div>
                  )}
                  {deal.notes && (
                    <div style={{ color: P.muted, fontSize: 12, marginBottom: 10, lineHeight: 1.55, borderLeft: `2px solid ${P.border2}`, paddingLeft: 8 }}>
                      {deal.notes}
                    </div>
                  )}
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                    {STAGES.filter(s => s !== stage && s !== "Dead").map(s => (
                      <button key={s} onClick={() => move(deal.id, s)} style={{
                        background: "transparent", border: `1px solid ${SC[s]}55`, color: SC[s],
                        borderRadius: 4, padding: "3px 8px", fontSize: 10, cursor: "pointer", fontWeight: 700,
                      }}>→ {s}</button>
                    ))}
                    <button onClick={() => move(deal.id, "Dead")} style={{ background: "transparent", border: `1px solid ${P.border}`, color: P.faint, borderRadius: 4, padding: "3px 8px", fontSize: 10, cursor: "pointer", marginLeft: "auto" }}>Kill</button>
                    <button onClick={() => del(deal.id)} style={{ background: "transparent", border: `1px solid ${P.border}`, color: P.faint, borderRadius: 4, padding: "3px 8px", fontSize: 10, cursor: "pointer" }}>🗑</button>
                  </div>
                  <div style={{ fontSize: 10, color: P.faint, marginTop: 8 }}>Added {deal.createdAt}</div>
                </Card>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── DUE DILIGENCE ──────────────────────────────────────────────────────────
function DueDiligence({ deals, setDeals }) {
  const [selId, setSelId] = useState("");
  const active = deals.filter(d => ["Offer Sent", "Under Contract"].includes(d.stage));
  const sel    = deals.find(d => d.id === selId);
  const done   = sel ? Object.values(sel.ddComplete || {}).filter(Boolean).length : 0;
  const pct    = sel ? Math.round((done / DD_ITEMS.length) * 100) : 0;

  const toggle = async (itemId) => {
    const updated = deals.map(d => d.id !== selId ? d : {
      ...d, ddComplete: { ...(d.ddComplete || {}), [itemId]: !(d.ddComplete && d.ddComplete[itemId]) }
    });
    await saveDeals(updated); setDeals(updated);
  };

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontWeight: 900, fontSize: 20, color: P.text, letterSpacing: "-0.02em" }}>✅ Due Diligence</div>
        <div style={{ color: P.muted, fontSize: 13, marginTop: 4 }}>10-point checklist. Takes 20 min. Never skip it — it's what separates pros from people with problems.</div>
      </div>

      <Card style={{ marginBottom: 16 }}>
        <Label>Select Deal</Label>
        <select
          value={selId}
          onChange={e => setSelId(e.target.value)}
          style={{ width: "100%", background: P.bg, border: `1px solid ${P.border}`, borderRadius: 6, color: P.text, padding: "9px 13px", fontSize: 14 }}
        >
          <option value="">— Choose a deal with an active offer —</option>
          {active.map(d => <option key={d.id} value={d.id}>{d.name} ({d.stage})</option>)}
        </select>
        {active.length === 0 && (
          <div style={{ fontSize: 12, color: P.muted, marginTop: 8 }}>No deals in "Offer Sent" or "Under Contract" stage yet. Add deals in Pipeline first.</div>
        )}
      </Card>

      {sel && (
        <React.Fragment>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <span style={{ fontWeight: 700, color: P.text }}>{sel.name}</span>
            <span style={{ fontWeight: 800, fontSize: 16, color: pct === 100 ? P.greenBr : P.amber }}>
              {done}/{DD_ITEMS.length} · {pct}%
            </span>
          </div>
          <ProgressBar pct={pct} color={pct === 100 ? P.greenBr : P.green} height={8} />
          <div style={{ marginTop: 16 }}>
            {DD_ITEMS.map(item => {
              const checked = !!(sel.ddComplete && sel.ddComplete[item.id]);
              return (
                <div
                  key={item.id}
                  onClick={() => toggle(item.id)}
                  style={{
                    display: "flex", gap: 14, alignItems: "flex-start",
                    padding: "13px 16px", marginBottom: 6, borderRadius: 8, cursor: "pointer",
                    background: checked ? "#E9F0E2" : P.card2,
                    border: `1px solid ${checked ? P.green + "55" : P.border}`,
                    transition: "background 0.15s, border-color 0.15s",
                  }}
                >
                  <div style={{
                    width: 20, height: 20, borderRadius: 5, flexShrink: 0, marginTop: 1,
                    border: `2px solid ${checked ? P.greenBr : P.border2}`,
                    background: checked ? P.greenBr : "transparent",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    color: "#FBF7EE", fontSize: 12, fontWeight: 900,
                  }}>
                    {checked ? "✓" : ""}
                  </div>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 14, color: checked ? P.greenBr : P.text }}>{item.label}</div>
                    <div style={{ fontSize: 12, color: P.muted, marginTop: 3, lineHeight: 1.5 }}>{item.tip}</div>
                  </div>
                </div>
              );
            })}
          </div>

          {pct === 100 && (
            <Card style={{ marginTop: 14, background: "#E9F0E2", border: `1px solid ${P.greenBr}`, textAlign: "center" }}>
              <div style={{ fontSize: 32, marginBottom: 6 }}>🎉</div>
              <div style={{ fontWeight: 900, color: P.greenBr, fontSize: 18 }}>Due Diligence Complete</div>
              <div style={{ color: P.muted, fontSize: 13, marginTop: 6 }}>
                {sel.name} is clear. Move to close with confidence.
              </div>
            </Card>
          )}
        </React.Fragment>
      )}
    </div>
  );
}

// ─── ROOT ────────────────────────────────────────────────────────────────────
function App() {
  const [tab,    setTab]    = useState("dash");
  const [deals,  setDeals]  = useState([]);
  const [budget, setBudget] = useState({ cash: "", reserve: "", mail: "" });
  const [ready,  setReady]  = useState(false);

  useEffect(() => {
    loadDeals().then(d => { setDeals(d); setBudget(loadBudget()); setReady(true); });
  }, []);

  const tabs = [
    { id: "dash",     icon: "🏠", label: "Dashboard" },
    { id: "budget",   icon: "💰", label: "Budget" },
    { id: "scout",    icon: "🔍", label: "Market Scout" },
    { id: "analyzer", icon: "📊", label: "Deal Analyzer" },
    { id: "offer",    icon: "✉️", label: "Offer Writer" },
    { id: "pipeline", icon: "📋", label: "Pipeline" },
    { id: "dd",       icon: "✅", label: "Due Diligence" },
  ];

  if (!ready) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: P.bg, color: P.muted, fontSize: 14, fontFamily: "system-ui, sans-serif" }}>
      Loading LandFlip HQ…
    </div>
  );

  return (
    <div style={{ fontFamily: "system-ui, -apple-system, sans-serif", background: P.bg, color: P.text, minHeight: "100vh" }}>
      <div style={{ background: P.card, borderBottom: `1px solid ${P.border}`, padding: "10px 20px", display: "flex", alignItems: "center", gap: 14, position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ width: 32, height: 32, borderRadius: 8, background: P.green + "22", border: `1px solid ${P.green}55`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🌿</div>
        <div>
          <div style={{ fontWeight: 900, fontSize: 15, letterSpacing: "-0.02em" }}>LandFlip HQ</div>
          <div style={{ fontSize: 10, color: P.faint, letterSpacing: "0.04em" }}>FLIP DIRT, NOT HOUSES · $75K GOAL</div>
        </div>
        <div style={{ marginLeft: "auto", textAlign: "right" }}>
          <div style={{ fontSize: 10, color: P.muted }}>Annual Target</div>
          <div style={{ fontSize: 14, fontWeight: 900, color: P.greenBr }}>$75,000</div>
        </div>
      </div>

      <div style={{ background: P.card, borderBottom: `1px solid ${P.border}`, padding: "0 16px", display: "flex", gap: 2, overflowX: "auto" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            background: "none", border: "none",
            borderBottom: `2px solid ${tab === t.id ? P.green : "transparent"}`,
            color: tab === t.id ? P.green : P.muted,
            padding: "11px 14px", fontSize: 12,
            fontWeight: tab === t.id ? 800 : 400,
            cursor: "pointer", whiteSpace: "nowrap",
            display: "flex", alignItems: "center", gap: 6,
            letterSpacing: "0.01em",
            transition: "color 0.15s",
          }}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>

      <div style={{ padding: "22px 20px", maxWidth: 980, margin: "0 auto" }}>
        {tab === "dash"     && <Dashboard    deals={deals} budget={budget} />}
        {tab === "budget"   && <BudgetEngine deals={deals} budget={budget} setBudget={setBudget} />}
        {tab === "scout"    && <MarketScout />}
        {tab === "analyzer" && <DealAnalyzer deals={deals} budget={budget} />}
        {tab === "offer"    && <OfferWriter />}
        {tab === "pipeline" && <Pipeline     deals={deals} setDeals={setDeals} />}
        {tab === "dd"       && <DueDiligence deals={deals} setDeals={setDeals} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
